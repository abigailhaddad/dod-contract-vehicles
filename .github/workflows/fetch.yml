name: Fetch DoD Contracts

on:
  workflow_dispatch:
    inputs:
      fy:
        description: "Space-separated fiscal years (e.g. '2026 2025'). Blank = default 5 years."
        required: false
        default: ""
      force:
        description: "Re-download even if checkpoint exists"
        type: boolean
        default: false
      build_only:
        description: "Skip fetch, just rebuild dashboard from R2 data"
        type: boolean
        default: false
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 8am UTC (4am ET / 1am PT)

permissions:
  actions: write
  contents: write

concurrency:
  group: fetch-dod
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ inputs.build_only != true }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests boto3 pyyaml

      - name: Download checkpoints from R2
        run: |
          python r2_sync.py download --dir data/bulk_checkpoints
          # Remove any stale merged CSV that landed in checkpoints
          rm -f data/bulk_checkpoints/dod_contracts_bulk.csv

      - name: Run fetch
        id: fetch
        run: |
          ARGS="--agencies 097"
          if [ -n "${{ inputs.fy }}" ]; then
            ARGS="$ARGS --fy ${{ inputs.fy }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python fetch_awards.py $ARGS
          # Delete merged CSV to save disk
          rm -f data/dod_contracts_bulk.csv
          echo "status=$(cat data/scan_status.txt)" >> $GITHUB_OUTPUT

      - name: Upload checkpoints to R2
        if: always()
        run: python r2_sync.py upload --dir data/bulk_checkpoints

      - name: Chain next run if IP blocked
        if: steps.fetch.outputs.status == 'blocked'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "IP blocked -- chaining next run with fresh runner IP"
          gh workflow run fetch.yml --repo ${{ github.repository }}

    outputs:
      status: ${{ steps.fetch.outputs.status }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs: [fetch]
    if: ${{ always() && (needs.fetch.outputs.status == 'done' || needs.fetch.result == 'skipped') }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 pyyaml

      - name: Build dashboard (streams from R2, no local data needed)
        run: python build_dashboard.py

      - name: Upload dashboard JSONs to R2 staging
        run: python r2_sync.py upload --dir web/data --prefix dashboard_data_staging/ --suffix .json --mirror

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    # Runs whenever build succeeded, including build_only=true runs where
    # fetch was skipped. Without this, test auto-skips because the upstream
    # chain includes a skipped job.
    if: ${{ always() && needs.build.result == 'success' }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install boto3 pyyaml pytest pytest-playwright
          playwright install --with-deps chromium

      - name: Pull staging JSONs
        run: python r2_sync.py download --dir web/data --prefix dashboard_data_staging/

      - name: Run data tests
        run: pytest tests/test_data.py -v

      - name: Run frontend tests
        run: pytest tests/test_frontend.py -v

  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    if: ${{ always() && needs.test.result == 'success' }}

    env:
      CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history to fast-forward prod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install boto3

      - name: Promote R2 staging -> prod
        run: python r2_sync.py promote --src dashboard_data_staging/ --dst dashboard_data/

      - name: Fast-forward prod branch to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main prod || git fetch origin main
          git checkout -B prod origin/main
          git push origin prod --force-with-lease
